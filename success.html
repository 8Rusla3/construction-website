<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8">
  <title>Message Received | Centaurus Construction Group</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Thank you for contacting Centaurus Construction Group. We will be in touch shortly.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0a2744">
  <link rel="canonical" href="https://centaurusgroup.ca/success.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a2744'/%3E%3Ctext x='50' y='64' font-size='60' text-anchor='middle' fill='%23e8942a' font-family='Arial'%3EC%3C/text%3E%3C/svg%3E">
  <style>
    .success-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(24px, 5vw, 48px) 16px;
    }
    .success-card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: clamp(28px, 5vw, 40px);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      text-align: center;
    }
    .success-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      background: var(--success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #fff;
      font-weight: 800;
    }
    .success-card h1 {
      font-size: clamp(1.35rem, 1.1rem + 1vw, 1.65rem);
      margin: 0 0 10px;
      color: var(--primary);
    }
    .success-card .lead {
      color: var(--muted);
      margin: 0 0 24px;
      line-height: var(--lh-body);
    }
    .success-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .success-note {
      margin-top: 20px;
      font-size: 0.875rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="success-wrap">
    <div class="success-card">
      <div class="success-icon" aria-hidden="true">✓</div>
      <h1>Thank you!</h1>
      <p class="lead">Your message was sent ❤️ Our team will review it and respond as soon as possible - typically within one business day.</p>
      <div class="success-actions">
        <a href="index.html" class="btn btn-primary btn-block">Back to Home</a>
        <a href="contact.html" class="btn btn-outline-dark btn-block">Send Another Message</a>
        <a href="tel:+14372143053" class="btn btn-secondary btn-block">Call +1 (437) 214&#x2011;3053</a>
      </div>
      <p class="success-note">Urgent Issue? Call us | 7:00 AM - 9:00 PM | Seven Days a Week.</p>
    </div>
  </div>

</body>
</html>
